{% load static %}

<!DOCTYPE html>
<html class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/b6b4c8d3e7.js" crossorigin="anonymous"></script>
    <script
        src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio,line-clamp,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#7289db",
                        sub: "#50566d"
                    },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="styles.css" />

</head>

<body>


    <section class="w-full md:h-[400px] h-[300px] relateive bg-no-repeat bg-top bg-center bg-cever"
       style="background-image: url('{% static "assets/careers-bg.jpg" %}');"   
        
        >
        <div class="w-full md:h-[400px] h-[300px]   bg-[#fafafca3] ">
            <nav class="min-h-12  py-4 md:py-0 opacity-100">
                <div class="container m-auto md:px-0 px-4">
                    <div class="pt-5 h-full flex justify-end items-center ">
                        <ul class="flex gap-4 items-center">
                            <li class=" flex items-center gap-2">
                                <a class=" py-1 font-sans font-semibold rounded-full flex items-center px-5 text-white   bg-primary "
                                    href="#">Jobs</a>
                            </li>
                            <li class=" flex items-center gap-2">
                                <a class=" py-1 font-sans font-semibold rounded-full flex items-center px-5 text-white   bg-primary "
                                    href="#">Applications</a>
                            </li>
                            <li class=" flex items-center gap-2">
                                <a class=" py-1 font-sans font-semibold rounded-full flex items-center px-5 text-white   bg-primary "
                                    href="#">Saved Jobs</a>
                            </li>
                            <li>
                                <a class=" border-[1px] w-10 h-10 flex items-center justify-center rounded-full border-black hover:text-[#7289db]  hover:border-[#7289db] "
                                    href="#">
                                    <i class="fa-solid fa-user-tie"></i>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </section>

    <section>
        <div class="max-w-[1200px] m-auto">
            <div class="flex gap-5 justify-between md:px-0 px-4">
                <div class="w-[300px] h-fit md:mt-[150px] mt-[305px] border rounded-xl px-6 py-4 flex flex-col gap-3">
                        <h6 class="ont-sans  font-semibold text flex items-center">
                            <span class="bg-primary px-4 py-1 rounded-full text-white">
                                Profile
                            </span>
                        </h6>

                        <a class="ont-sans  font-semibold text flex items-center">
                            <span class="hover:bg-primary/20 px-4 py-1 rounded-full text-primary  ">
                                Applications
                            </span>
                        </a>

                        <a class="ont-sans  font-semibold text flex items-center">
                            <span class="hover:bg-primary/20 px-4 py-1 rounded-full text-primary  ">
                                Saved Jobs
                            </span>
                        </a>

                </div>
                <div class="w-full ">
                    <div class="flex justify-between gap-1  flex-col md:flex-row items-center">
                        <div class="flex  md:flex-row flex-col items-center  w-full gap-5 ">
                            <div class="w-32 h-32 cursor-pointer -mt-16 m-0 md:-ml-16 bg-white border p-2 rounded-full relative flex items-center justify-center">
                                <!-- <img src="border rounded-full" alt=""> -->
                                <i class="fa-solid fa-camera  absolute top-1 p-1 text-primary  border rounded-full right-2"></i>
                                <i class="fa-solid fa-user-tie text-5xl text-primary "></i>
                            </div>
                            <div class="mt-6 flex flex-col gap-1">
                                <h3 class="font-sans md:text-left text-center font-semibold text-xl "> {{ profile.name }} </h3>
                                <p class="font-sans md:text-left text-center text-sub ">{{ user.email }}</p>
                                <p class="font-sans md:text-left text-center text-sub ">{{profile.phone_number}}</p>
                            </div>
                        </div>

                            <a target="_blank"  href="{{profile.resume.url}}" class="py-2 flex items-center justify-center w-40 h-12 font-sans font-semibold rounded mt-5 px-4 text-white   bg-primary ">View Resume</a>

                    </div>
                    <div class="w-full border rounded-xl px-6 py-4 mt-10">
            <div class="flex gap-5 border-b pb-2">
                                    <a href="#profile" class="ont-sans hover:border-b-2  border-primary text-primary font-semibold text-xl">Profile</a>
                                    <a href="#skill" class="hover:border-b-2  border-primary ont-sans text-primary font-semibold text-xl">Skills</a>
                                    <a href="{{profile.resume.url}}" target="_blank" class="hover:border-b-2  border-primary ont-sans text-primary font-semibold text-xl">Resume</a>

            </div>
                        

                        <form id="profile" action="" class="flex gap-3 flex-col mt-5">
                            <div class="flex flex-col gap-1">
                                <label for="">Name</label>
                                <input value="{{profile.name}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>

                            <div class="flex flex-col gap-1">
                                <label for="">Email</label>
                                <input value="{{user.email}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>
                            <div class="flex flex-col gap-1">
                                <label for="">Phone</label>
                                <input value="{{profile.phone_number}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>
                            
                            <div class="flex flex-col gap-1">
                                <label for="">Title</label>
                                <input value="{{profile.job_title}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>
                            <div class="flex flex-col gap-1">
                                <label for="">Country</label>
                                <input value="{{profile.country}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>
                            
                            <div class="flex flex-col gap-1">
                                <label for="">City</label>
                                <input value="{{profile.city}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>
                            <div class="flex flex-col gap-1">
                                <label for="">Zip Code</label>
                                <input value="{{profile.zip_code}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>
                            
                            <div id="skill" class="flex flex-col gap-1">
                                <label for="">Expected Salary</label>
                                <input value="{{profile.expected_salary}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>
                            <div id="skill" class="flex flex-col gap-1">
                                <label for="">Skills</label>
                                <input value="{{profile.skill}}" class="py-1 border w-fit" value="Imran Hossen" type="text" name="" id="">
                            </div>
                            <div>
                                <button class="bg-primary  hover:bg-primary rounded font-sans text-sm px-3 py-2 text-white w-40">Save</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </section>


<footer class="bg-black text-white mt-10">
    <div class="h-14 bg-primary flex items-center justify-center">
        <p class="text-center mx-4">
            Copyright ©2024. All rights Reserved. Site designed & Maintained by Mumin
            International
        </p>
    </div>
</footer>
</body>

</html>
